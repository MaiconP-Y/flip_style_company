worker_processes auto; 

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    limit_req_zone $binary_remote_addr zone=my_limit_zone:10m rate=5r/s;

    server {
        listen 80;
        server_name flipstylecompany.com.br www.flipstylecompany.com.br;

        # O Certbot vai usar essa pasta para validar o domínio
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # BLACKLIST: Bloqueia robôs caçando WordPress e scripts PHP
        location ~* /(wp-admin|wp-login|wp-content|wp-includes|\.php) {
            access_log off;
            return 444;     
        }

        client_max_body_size 10M;
        add_header X-Content-Type-Options "nosniff";

        location /static/ {
            alias /app/staticfiles/;
            access_log off;
        }

        location /media/ {
            alias /app/media/;
            access_log off;
        }

        # Repassa o tráfego temporariamente via HTTP para o Django
        location / {
            limit_req zone=my_limit_zone burst=18 nodelay; 

            proxy_pass http://web:8000; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}